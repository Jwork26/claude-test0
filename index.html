<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미국 주식 시세</title>
<style>
  :root {
    --up: #ff5252;
    --down: #4d9fff;
    --muted: #8b909a;
    --bg: #0e1116;
    --card: #1a1e26;
    --border: #2a2f3a;
    --cell: #20252f;
    --text: #e8eaed;
    --hl-bg: #1a2e2e;
    --hl-border: #2dd4bf;
    --hl-text: #5eead4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px 14px;
    background: var(--bg);
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    color: var(--text);
    display: flex; flex-direction: column; align-items: center;
  }
  .search { display: flex; gap: 8px; margin-bottom: 18px; width: 100%; max-width: 560px; }
  .search input {
    flex: 1; padding: 10px 12px; font-size: 15px;
    background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; outline: none;
    text-transform: uppercase;
  }
  .search input:focus { border-color: #4a90d9; }
  .search button {
    padding: 10px 18px; font-size: 15px; font-weight: 600;
    background: #e8eaed; color: #14171c; border: none; border-radius: 8px; cursor: pointer;
  }

  .cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 560px; }

  .card {
    position: relative;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px 14px;
  }
  .remove {
    position: absolute; top: 12px; right: 14px;
    color: var(--muted); cursor: pointer; font-size: 14px;
    background: none; border: none; line-height: 1;
  }

  /* 상단: 거래소 + 마켓 정보 */
  .meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; }

  /* 회사명 */
  .company {
    font-size: 20px; font-weight: 700; line-height: 1.2;
    margin-bottom: 14px; padding-right: 24px;
  }
  .company .sym { color: var(--muted); font-weight: 500; font-size: 17px; }

  /* 가격 영역: 좌우 배치 */
  .price-area {
    display: flex; align-items: flex-start; gap: 16px;
    flex-wrap: wrap;
  }

  /* 좌: 종가 블록 */
  .p-close { flex: 0 0 auto; }
  .p-main {
    font-size: 32px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1;
  }
  .p-chg { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .p-time { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* 우: 오버나이트/애프터 블록 (하이라이트 박스) */
  .p-overnight {
    flex: 0 0 auto;
    background: var(--hl-bg);
    border: 1px solid var(--hl-border);
    border-radius: 10px;
    padding: 8px 14px 10px;
  }
  .p-overnight .p-main { color: var(--hl-text); font-size: 30px; }
  .p-overnight .p-chg { color: var(--hl-text); }
  .p-overnight .p-time { color: #5eead4aa; }

  .up { color: var(--up); }
  .down { color: var(--down); }
  .neutral { color: var(--muted); }

  /* OHLC 그리드 */
  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
  .cell { background: var(--cell); padding: 7px 8px; }
  .cell .lbl { font-size: 10px; color: var(--muted); margin-bottom: 1px; }
  .cell .val { font-size: 13px; font-weight: 600; }

  /* 최근 4일 종가 */
  .recent { margin-top: 8px; }
  .recent .rlbl { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .rgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
  .rcell { background: var(--cell); padding: 6px 8px; text-align: center; }
  .rcell .rd { font-size: 10px; color: var(--muted); }
  .rcell .rv { font-size: 12px; font-weight: 600; }

  .msg { color: var(--muted); font-size: 13px; padding: 6px 0; }
  .err { color: var(--up); }
</style>
</head>
<body>
  <div class="search">
    <input id="symbol" placeholder="종목 추가 (예: AAPL)">
    <button id="go">추가</button>
  </div>
  <div class="cards" id="cards"></div>

<script>
  const REFRESH_MS = 10000;
  const RETRY_MS   = 3000;
  const DEFAULTS   = ["SNDK", "MU"];
  let symbols = [...DEFAULTS];
  const _retryTimers = {};

  const $ = id => document.getElementById(id);
  const cards = $("cards");

  const fmt = n => (n == null) ? "-"
    : Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const cardId = sym => "card-" + sym;

  function chgHtml(chg, pct, cls) {
    if (chg == null) return '<span class="neutral">-</span>';
    const sign = chg >= 0 ? "▲ +" : "▼ ";
    return `<span class="${cls}">${sign}${fmt(Math.abs(chg))} (${chg>=0?"+":""}${fmt(pct)}%)</span>`;
  }

  function render() {
    cards.innerHTML = symbols.map(s =>
      `<div class="card" id="${cardId(s)}">
         <div class="msg">${s} 불러오는 중…</div>
         <button class="remove" data-sym="${s}">✕</button>
       </div>`
    ).join("");
    cards.querySelectorAll(".remove").forEach(b =>
      b.addEventListener("click", () => removeSymbol(b.dataset.sym)));
    symbols.forEach(load);
  }

  function removeSymbol(sym) {
    symbols = symbols.filter(s => s !== sym);
    render();
  }

  async function load(sym) {
    const el = $(cardId(sym));
    if (!el) return;
    try {
      const res = await fetch(`/api/quote?symbol=${encodeURIComponent(sym)}`);
      const d = await res.json();
      if (!res.ok) {
        el.innerHTML = `<div class="msg err">${sym}: ${d.error || "조회 실패"}</div>
          <button class="remove" data-sym="${sym}">✕</button>`;
        rebind(el); return;
      }

      const st = d.marketState;
      const isPost = d.isPostMarket;

      // 종가 등락
      const regCls  = (d.regularChange ?? 0) >= 0 ? "up" : "down";
      const regChg  = chgHtml(d.regularChange, d.regularChangePct, regCls);

      // 장외가 등락
      const liveCls = (d.change ?? 0) >= 0 ? "up" : "down";
      const liveChg = chgHtml(d.change, d.changePct, liveCls);

      // 거래소 메타
      const exch = d.exchange ? `${d.exchange} · ` : "";
      const mktLabel = isPost
        ? (st === "PREPRE" ? "BOATS Real Time Price" : "After Hours Price")
        : (st === "PRE" ? "Pre-Market Price" : "Real Time Price");
      const currency = d.currency || "USD";
      const metaStr = `${exch}${mktLabel} · ${currency}`;

      // 종가 시간: 정규장 마감 4:00 PM (고정)
      const closeTimeStr = "4:00:00 PM EDT (At close)";

      // 현재(오버나이트/애프터) 시간
      const liveIcon  = st === "PREPRE" ? "🌙" : (st.startsWith("POST") ? "🌆" : "🟢");
      const liveLabel = st === "PREPRE" ? "Overnight" : (st.startsWith("POST") ? "After Hours" : d.marketLabel);

      let priceArea = "";
      if (isPost) {
        priceArea = `
          <div class="price-area">
            <div class="p-close">
              <div class="p-main ${regCls}">$${fmt(d.regularPrice)}</div>
              <div class="p-chg">${regChg}</div>
              <div class="p-time">At close: 4:00:00 PM EDT</div>
            </div>
            <div class="p-overnight">
              <div class="p-main">$${fmt(d.price)}</div>
              <div class="p-chg">${liveChg}</div>
              <div class="p-time">${liveIcon} ${liveLabel}: ${d.fetchedET}${d.source === "LIVE" ? " 🟢" : ""}</div>
            </div>
          </div>`;
      } else if (st === "PRE") {
        // 프리마켓: 하이라이트 박스 왼쪽, 전일종가 오른쪽
        const prevCls = (d.change ?? 0) >= 0 ? "up" : "down";
        priceArea = `
          <div class="price-area">
            <div class="p-overnight">
              <div class="p-main">$${fmt(d.price)}</div>
              <div class="p-chg">${liveChg}</div>
              <div class="p-time">🌅 Pre-Market: ${d.fetchedET}${d.source === "LIVE" ? " 🟢" : ""}</div>
            </div>
            <div class="p-close">
              <div class="p-main ${regCls}">$${fmt(d.regularPrice)}</div>
              <div class="p-chg">${regChg}</div>
              <div class="p-time">At close: 4:00:00 PM EDT</div>
            </div>
          </div>`;
      } else {
        // 정규장
        priceArea = `
          <div class="price-area">
            <div class="p-close">
              <div class="p-main ${liveCls}">$${fmt(d.price)}</div>
              <div class="p-chg">${liveChg}</div>
              <div class="p-time">🟢 실시간: ${d.fetchedET}</div>
            </div>
          </div>`;
      }

      const recent = (d.recentCloses || []).map(r =>
        `<div class="rcell"><div class="rd">${r.date}</div><div class="rv">${fmt(r.close)}</div></div>`
      ).join("");

      el.innerHTML = `
        <button class="remove" data-sym="${sym}" title="삭제">✕</button>
        <div class="meta">${metaStr}</div>
        <div class="company">${d.name} <span class="sym">(${d.symbol})</span></div>
        ${priceArea}
        <hr class="divider">
        <div class="grid">
          <div class="cell"><div class="lbl">전일종가</div><div class="val">${fmt(d.previousClose)}</div></div>
          <div class="cell"><div class="lbl">시가</div><div class="val">${fmt(d.open)}</div></div>
          <div class="cell"><div class="lbl">고가</div><div class="val">${fmt(d.dayHigh)}</div></div>
          <div class="cell"><div class="lbl">저가</div><div class="val">${fmt(d.dayLow)}</div></div>
        </div>
        ${recent ? `<div class="recent"><div class="rlbl">최근 4일 종가</div><div class="rgrid">${recent}</div></div>` : ""}`;
      rebind(el);
    } catch (e) {
      let countdown = RETRY_MS / 1000;
      const tick = () => {
        const el2 = $(cardId(sym));
        if (!el2) return;
        el2.innerHTML = `<div class="msg err">${sym}: 서버 연결 중… (${countdown}초 후 재시도)</div>
          <button class="remove" data-sym="${sym}">✕</button>`;
        rebind(el2);
      };
      tick();
      clearTimeout(_retryTimers[sym]);
      _retryTimers[sym] = setTimeout(() => load(sym), RETRY_MS);
      const iv = setInterval(() => { countdown--; tick(); }, 1000);
      setTimeout(() => clearInterval(iv), RETRY_MS);
    }
  }

  function rebind(el) {
    const b = el.querySelector(".remove");
    if (b) b.addEventListener("click", () => removeSymbol(b.dataset.sym));
  }

  function addSymbol() {
    const sym = $("symbol").value.trim().toUpperCase();
    if (!sym || symbols.includes(sym)) { $("symbol").value = ""; return; }
    symbols.push(sym);
    $("symbol").value = "";
    render();
  }

  $("go").addEventListener("click", addSymbol);
  $("symbol").addEventListener("keydown", e => { if (e.key === "Enter") addSymbol(); });

  render();
  setInterval(() => symbols.forEach(load), REFRESH_MS);
</script>
</body>
</html>
